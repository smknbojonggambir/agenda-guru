<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda SMK Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .login-container { max-width: 400px; margin: 100px auto; }
        .hidden { display: none; }
        .card { margin-bottom: 20px; }
        .pancawaluya-box { background: #e9ecef; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <!-- Section Login -->
    <div id="loginSection" class="login-container">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="text-center">Login Agenda SMK</h3>
                <input type="text" id="user" class="form-control my-2" placeholder="Username">
                <input type="password" id="pass" class="form-control my-2" placeholder="Password">
                <button onclick="handleLogin()" class="btn btn-primary w-100">Login</button>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="mainDashboard" class="hidden mt-4">
        <nav class="navbar navbar-dark bg-dark mb-4 p-2 rounded">
            <span class="navbar-brand">Dashboard <span id="userDisplay"></span></span>
            <button onclick="location.reload()" class="btn btn-danger btn-sm">Logout</button>
        </nav>

        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#guru">Agenda Guru</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#kelas">Agenda Kelas</button></li>
            <li id="reportTab" class="nav-item hidden"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#laporan">Laporan (Kepala)</button></li>
        </ul>

        <div class="tab-content mt-3">
            <!-- Form Agenda Guru -->
            <div class="tab-pane fade show active" id="guru">
                <div class="card shadow-sm p-4">
                    <h5>Input Agenda Harian Guru</h5>
                    <form id="formGuru">
                        <div class="row">
                            <div class="col-md-6">
                                <label>Materi Pembelajaran</label>
                                <input type="text" name="materi" class="form-control mb-2" required>
                                <label>TP (Tujuan Pembelajaran)</label>
                                <textarea name="tp" class="form-control mb-2"></textarea>
                                <label>Model Pembelajaran</label>
                                <select name="metode" class="form-select mb-2">
                                    <option>PBL</option>
                                    <option>PJBL</option>
                                    <option>Discovery Learning</option>
                                    <option>Inquiry</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label>Kehadiran (H/S/I/A)</label>
                                <div class="input-group mb-2">
                                    <input type="number" name="hadir" placeholder="H" class="form-control">
                                    <input type="number" name="sakit" placeholder="S" class="form-control">
                                    <input type="number" name="izin" placeholder="I" class="form-control">
                                    <input type="number" name="alfa" placeholder="A" class="form-control">
                                </div>
                                <div class="pancawaluya-box mb-2">
                                    <label><b>Karakter Pancawaluya:</b></label><br>
                                    <input type="checkbox" name="pancawaluya" value="Cageur"> Cageur 
                                    <input type="checkbox" name="pancawaluya" value="Bageur"> Bageur 
                                    <input type="checkbox" name="pancawaluya" value="Bener"> Bener 
                                    <input type="checkbox" name="pancawaluya" value="Pinter"> Pinter 
                                    <input type="checkbox" name="pancawaluya" value="Singer"> Singer
                                </div>
                                <label>Integrasi AI / TIK</label>
                                <input type="text" name="aiTik" class="form-control mb-2" placeholder="Contoh: ChatGPT, Canva, Geogebra">
                                <label>Link Dokumentasi (Foto)</label>
                                <input type="url" name="dokumentasi" class="form-control mb-2" placeholder="https://drive.google.com/...">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success mt-3">Simpan Agenda Guru</button>
                    </form>
                </div>
            </div>

            <!-- Form Agenda Kelas -->
            <div class="tab-pane fade" id="kelas">
                <div class="card shadow-sm p-4">
                    <h5>Input Agenda Harian Kelas</h5>
                    <form id="formKelas">
                        <div class="row">
                            <div class="col-md-6">
                                <input type="text" name="guru" placeholder="Nama Guru Mengajar" class="form-control mb-2">
                                <input type="text" name="mapel" placeholder="Mata Pelajaran" class="form-control mb-2">
                                <label>Kondisi Sarana:</label>
                                <select name="sarana" class="form-select mb-2">
                                    <option>Semua Baik</option>
                                    <option>LCD Rusak</option>
                                    <option>Internet Mati</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label>Kebersihan:</label>
                                <select name="piket" class="form-select mb-2">
                                    <option>Baik/Bersih</option>
                                    <option>Cukup</option>
                                    <option>Kurang</option>
                                </select>
                                <textarea name="catatanKejadian" placeholder="Catatan Kejadian/Pelanggaran" class="form-control mb-2"></textarea>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary mt-3">Simpan Agenda Kelas</button>
                    </form>
                </div>
            </div>

            <!-- Report Area (Principal Only) -->
            <div class="tab-pane fade" id="laporan">
                <div class="card shadow-sm p-4">
                    <h5>Rekap Laporan Pembelajaran</h5>
                    <div id="reportContent" class="table-responsive"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDLNl7kCIb7J5u3Qnuk9MZz2ZUy9w-RipsV3e6Qwg_lQUTVQQ1oxOiLYFlGk-vYQ8RTA/exec";

    function handleLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        
        // Simulasi panggil backend Apps Script
        google.script.run.withSuccessHandler(res => {
            if(res.status === "success") {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                document.getElementById('userDisplay').innerText = `(${res.nama})`;
                if(res.role === 'kepala') {
                    document.getElementById('reportTab').classList.remove('hidden');
                    loadReport();
                }
            } else {
                alert("Login Gagal!");
            }
        }).login(u, p);
    }

    // Handle Form Submit
    document.getElementById('formGuru').onsubmit = function(e) {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        google.script.run.withSuccessHandler(msg => {
            alert(msg);
            e.target.reset();
        }).submitAgendaGuru(data);
    };

    function loadReport() {
        google.script.run.withSuccessHandler(data => {
            let html = '<table class="table table-bordered table-sm"><thead><tr>';
            data[0].forEach(h => html += `<th>${h}</th>`);
            html += '</tr></thead><tbody>';
            for(let i=1; i<data.length; i++){
                html += '<tr>';
                data[i].forEach(c => html += `<td>${c}</td>`);
                html += '</tr>';
            }
            html += '</tbody></table>';
            document.getElementById('reportContent').innerHTML = html;
        }).getReport();
    }
</script>
</body>
</html>
