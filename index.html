<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru SMK V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .panel { display: none; }
        .panel.active { display: block; }
        .loader { border-top-color: #059669; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <!-- LOADING STATE -->
    <div id="loading" class="fixed inset-0 bg-white z-[99] flex flex-col items-center justify-center">
        <div class="loader w-12 h-12 border-4 border-emerald-200 rounded-full mb-4"></div>
        <p class="text-emerald-800 font-bold">Sinkronisasi Database...</p>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="screen-login" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-emerald-50">
            <img class="w-20 h-20 mx-auto mb-6" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgz1tbb8TSawO2lHGi_GXN3Il5CtrN_K125hSy7D8NxvBFL6bywiebvkalj_6oRIBVxEm_zj84j6ZAlhKmaEOqjIeGHXe9SWw0HQipKs3aL8iy7K1Dc_Pd9SHMVZsOQrb99qTK78Wmee7StIKKzzfST5YU_CkGSAz3MuMJsrSL_nHt37c5AzIe8B7HodnQ/s320/LOGO%20SMKN%20BOJONGGAMBIR.png">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">Sistem Informasi Guru</h1>
            <p class="text-center text-gray-500 mb-8 text-sm">SMKN Bojonggambir</p>
            <div class="space-y-4">
                <select id="l-user" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50"></select>
                <input type="password" id="l-pass" placeholder="Password" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                <button onclick="doLogin()" id="btn-login" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 transition transform active:scale-95">Masuk Ke Dashboard</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="screen-main" class="hidden flex flex-col min-h-screen">
        <!-- Header -->
        <header class="bg-emerald-900 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <div class="bg-white p-1 rounded-lg"><img class="w-8 h-8" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgz1tbb8TSawO2lHGi_GXN3Il5CtrN_K125hSy7D8NxvBFL6bywiebvkalj_6oRIBVxEm_zj84j6ZAlhKmaEOqjIeGHXe9SWw0HQipKs3aL8iy7K1Dc_Pd9SHMVZsOQrb99qTK78Wmee7StIKKzzfST5YU_CkGSAz3MuMJsrSL_nHt37c5AzIe8B7HodnQ/s320/LOGO%20SMKN%20BOJONGGAMBIR.png"></div>
                <div>
                    <h2 id="u-name" class="font-bold text-sm md:text-base leading-none">User</h2>
                    <span id="u-level" class="text-[10px] bg-emerald-700 px-2 py-0.5 rounded-full uppercase tracking-wider">Level</span>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-red-500/20 hover:bg-red-500 p-2 rounded-full transition"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        </header>

        <div class="flex flex-1">
            <!-- Sidebar -->
            <nav class="w-20 md:w-64 bg-white border-r flex flex-col p-2 md:p-4 gap-2">
                <button onclick="setPanel('agenda')" class="nav-btn active flex items-center gap-3 p-3 rounded-xl text-gray-600 hover:bg-emerald-50"><i data-lucide="calendar"></i><span class="hidden md:block">Agenda</span></button>
                <button onclick="setPanel('absensi')" class="nav-btn flex items-center gap-3 p-3 rounded-xl text-gray-600 hover:bg-emerald-50 guru-only"><i data-lucide="users"></i><span class="hidden md:block">Absensi</span></button>
                <button onclick="setPanel('rekap')" class="nav-btn flex items-center gap-3 p-3 rounded-xl text-gray-600 hover:bg-emerald-50"><i data-lucide="bar-chart-3"></i><span class="hidden md:block">Rekap Data</span></button>
            </nav>

            <!-- Content Area -->
            <main class="flex-1 p-4 md:p-8 overflow-y-auto">
                
                <!-- PANEL: AGENDA -->
                <div id="p-agenda" class="panel active space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 guru-only admin-only">
                        <h3 class="text-lg font-bold mb-4 text-emerald-800">Tambah Agenda Mengajar</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="date" id="f-tgl" class="p-3 bg-gray-50 border rounded-xl">
                            <input type="text" id="f-jam" placeholder="Jam Ke (Contoh: 1-4)" class="p-3 bg-gray-50 border rounded-xl">
                            <select id="f-kelas" class="p-3 bg-gray-50 border rounded-xl"></select>
                            <select id="f-mapel" class="p-3 bg-gray-50 border rounded-xl"></select>
                            <input type="text" id="f-materi" placeholder="Materi Pembelajaran" class="p-3 bg-gray-50 border rounded-xl md:col-span-2">
                            <div class="md:col-span-2">
                                <label class="text-xs font-bold text-gray-400 mb-1 block">TANDA TANGAN</label>
                                <canvas id="canvas" class="w-full h-32 border bg-gray-50 rounded-xl cursor-crosshair"></canvas>
                                <button onclick="clearCanvas()" class="text-xs text-red-500 mt-1 font-semibold">Hapus TTD</button>
                            </div>
                            <button onclick="saveAgenda()" class="md:col-span-2 bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-emerald-200">Simpan Ke Database</button>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="p-4 border-b bg-gray-50/50 flex justify-between items-center">
                            <h3 class="font-bold text-gray-700">Riwayat Agenda</h3>
                            <button onclick="init()" class="text-emerald-600"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead class="bg-gray-50 text-gray-500">
                                    <tr>
                                        <th class="p-4 text-left">Tgl</th>
                                        <th class="p-4 text-left">Guru</th>
                                        <th class="p-4 text-left">Kelas/Mapel</th>
                                        <th class="p-4 text-left">Materi</th>
                                        <th class="p-4 text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="t-agenda"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- PANEL: ABSENSI -->
                <div id="p-absensi" class="panel space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h3 class="text-lg font-bold mb-4 text-emerald-800">Absensi Siswa</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                            <input type="date" id="abs-tgl" class="p-3 bg-gray-50 border rounded-xl">
                            <select id="abs-kelas" onchange="loadSiswa()" class="p-3 bg-gray-50 border rounded-xl"></select>
                        </div>
                        <div id="siswa-list" class="space-y-2 mb-6"></div>
                        <button id="btn-absensi" onclick="saveAbsensi()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl hidden">Simpan Absensi</button>
                    </div>
                </div>

                <!-- PANEL: REKAP -->
                <div id="p-rekap" class="panel">
                    <div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border">
                        <h3 class="font-bold mb-4">Grafik & Statistik akan tampil di sini secara real-time dari Google Sheets.</h3>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/a/macros/guru.smk.belajar.id/s/AKfycby6GIjpBrp5vVjhsTL8vSAiazbDXYfQgrGIHzZCITLPQq3_D_jvlmoY1xZ4bs6FtsguXQ/exec"; // GANTI INI!
        let DB = {}, curUser = {}, canvas, ctx, drawing = false;

        async function init() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(API);
                DB = await res.json();
                renderDropdowns();
                renderAgendaTable();
                document.getElementById('loading').classList.add('hidden');
            } catch (e) { alert("Gagal sinkron data!"); }
        }

        function renderDropdowns() {
            const users = DB.guru.map(u => `<option value="${u.nama_guru}">${u.nama_guru}</option>`).join('');
            document.getElementById('l-user').innerHTML = '<option value="">-- Pilih Nama --</option>' + users;
            
            const kls = DB.kelas.map(k => `<option value="${k.nama_kelas}">${k.nama_kelas}</option>`).join('');
            document.getElementById('f-kelas').innerHTML = '<option value="">Pilih Kelas</option>' + kls;
            document.getElementById('abs-kelas').innerHTML = '<option value="">Pilih Kelas</option>' + kls;

            const mpl = DB.mapel.map(m => `<option value="${m.nama_mapel}">${m.nama_mapel}</option>`).join('');
            document.getElementById('f-mapel').innerHTML = '<option value="">Pilih Mapel</option>' + mpl;
        }

        async function doLogin() {
            const user = document.getElementById('l-user').value;
            const pass = document.getElementById('l-pass').value;
            if(!user || !pass) return alert("Isi data!");

            const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'login', user, pass })});
            const data = await res.json();

            if(data.status === "SUCCESS") {
                curUser = data;
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-main').classList.remove('hidden');
                document.getElementById('u-name').innerText = data.user;
                document.getElementById('u-level').innerText = data.level;
                
                // Role Filter
                if(data.level === "Kepala") document.querySelectorAll('.guru-only').forEach(el => el.classList.add('hidden'));
                
                lucide.createIcons();
                setupCanvas();
                renderAgendaTable();
            } else {
                alert("Password Salah!");
            }
        }

        function setupCanvas() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const getPos = e => ({ x: e.offsetX || e.touches[0].clientX - canvas.getBoundingClientRect().left, y: e.offsetY || e.touches[0].clientY - canvas.getBoundingClientRect().top });
            const start = e => { drawing = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); };
            const draw = e => { if(drawing) { ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); } };
            const stop = () => drawing = false;
            canvas.onmousedown = start; canvas.onmousemove = draw; canvas.onmouseup = stop;
            canvas.ontouchstart = start; canvas.ontouchmove = draw; canvas.ontouchend = stop;
        }

        function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }

        async function saveAgenda() {
            const data = {
                tipe: 'agenda',
                tgl: document.getElementById('f-tgl').value,
                jam: document.getElementById('f-jam').value,
                kelas: document.getElementById('f-kelas').value,
                mapel: document.getElementById('f-mapel').value,
                materi: document.getElementById('f-materi').value,
                ttd: canvas.toDataURL(),
                guru: curUser.user
            };
            if(!data.tgl || !data.kelas) return alert("Lengkapi data!");
            await send('create', data);
            alert("Berhasil!");
            init();
        }

        function loadSiswa() {
            const kls = document.getElementById('abs-kelas').value;
            const s = DB.siswa.filter(x => x.kelas === kls);
            document.getElementById('siswa-list').innerHTML = s.map(i => `
                <div class="flex justify-between items-center p-3 bg-white border rounded-xl shadow-sm">
                    <span class="font-medium text-sm">${i.nama_siswa}</span>
                    <select class="abs-val border rounded-lg p-1 text-sm outline-none" data-siswa="${i.nama_siswa}">
                        <option>Hadir</option><option>Izin</option><option>Sakit</option><option>Alpha</option>
                    </select>
                </div>
            `).join('');
            document.getElementById('btn-absensi').classList.toggle('hidden', s.length === 0);
        }

        async function saveAbsensi() {
            const tgl = document.getElementById('abs-tgl').value;
            const kls = document.getElementById('abs-kelas').value;
            const vals = document.querySelectorAll('.abs-val');
            document.getElementById('loading').classList.remove('hidden');
            for(let v of vals) {
                await send('create', { tipe: 'absensi', tgl, kelas: kls, siswa: v.dataset.siswa, status: v.value, guru: curUser.user });
            }
            alert("Absensi Tersimpan!");
            init();
        }

        function renderAgendaTable() {
            let records = DB.records.filter(r => r.tipe === 'agenda');
            if(curUser.level === "Guru") records = records.filter(r => r.nama_guru === curUser.user);
            
            document.getElementById('t-agenda').innerHTML = records.map(r => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4 font-semibold">${r.tanggal}</td>
                    <td class="p-4 text-xs text-gray-500">${r.nama_guru}</td>
                    <td class="p-4 text-xs"><b>${r.kelas}</b><br>${r.mata_pelajaran}</td>
                    <td class="p-4 text-xs">${r.materi}</td>
                    <td class="p-4 text-center">
                        ${curUser.level === 'Admin' || r.nama_guru === curUser.user ? 
                        `<button onclick="delRecord(${r.rowId})" class="text-red-400 hover:text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : '-'}
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        async function delRecord(id) {
            if(!confirm("Hapus data ini?")) return;
            await send('delete', { rowId: id });
            init();
        }

        async function send(action, data) {
            return fetch(API, { method: 'POST', body: JSON.stringify({ action, ...data, data })});
        }

        function setPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'bg-emerald-100', 'text-emerald-800'));
            event.currentTarget.classList.add('active', 'bg-emerald-100', 'text-emerald-800');
        }

        window.onload = init;
    </script>
</body>
</html>
