<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMK Dashboard Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0fdf4; }
        .panel { display: none; }
        .panel.active { display: block; }
        canvas { touch-action: none; }
    </style>
</head>
<body class="min-h-screen">

    <!-- OVERLAY LOADING -->
    <div id="loading" class="fixed inset-0 bg-emerald-900/90 z-[99] flex flex-col items-center justify-center text-white">
        <div class="w-12 h-12 border-4 border-t-transparent border-white rounded-full animate-spin mb-4"></div>
        <p class="font-bold tracking-widest">SINKRONISASI DATA...</p>
    </div>

    <!-- SCREEN: LOGIN -->
    <div id="screen-login" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-emerald-100">
            <div class="text-center mb-8">
                <img class="w-20 h-20 mx-auto mb-4" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgz1tbb8TSawO2lHGi_GXN3Il5CtrN_K125hSy7D8NxvBFL6bywiebvkalj_6oRIBVxEm_zj84j6ZAlhKmaEOqjIeGHXe9SWw0HQipKs3aL8iy7K1Dc_Pd9SHMVZsOQrb99qTK78Wmee7StIKKzzfST5YU_CkGSAz3MuMJsrSL_nHt37c5AzIe8B7HodnQ/s320/LOGO%20SMKN%20BOJONGGAMBIR.png">
                <h1 class="text-2xl font-bold text-emerald-900">Selamat Datang</h1>
                <p class="text-gray-500 text-sm">Masuk untuk mengelola Dashboard Guru</p>
            </div>
            <div class="space-y-4">
                <select id="l-user" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50"></select>
                <input type="password" id="l-pass" placeholder="Password" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                <button onclick="doLogin()" id="btn-login" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 transition">MASUK</button>
            </div>
        </div>
    </div>

    <!-- SCREEN: DASHBOARD -->
    <div id="screen-main" class="hidden min-h-screen flex flex-col">
        <header class="bg-emerald-900 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <img class="w-8 h-8 bg-white p-1 rounded" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgz1tbb8TSawO2lHGi_GXN3Il5CtrN_K125hSy7D8NxvBFL6bywiebvkalj_6oRIBVxEm_zj84j6ZAlhKmaEOqjIeGHXe9SWw0HQipKs3aL8iy7K1Dc_Pd9SHMVZsOQrb99qTK78Wmee7StIKKzzfST5YU_CkGSAz3MuMJsrSL_nHt37c5AzIe8B7HodnQ/s320/LOGO%20SMKN%20BOJONGGAMBIR.png">
                <div>
                    <h2 id="u-name" class="font-bold text-sm leading-none uppercase">User</h2>
                    <span id="u-level" class="text-[10px] bg-emerald-700 px-2 py-0.5 rounded-full uppercase font-bold">Level</span>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-emerald-800 p-2 rounded-full hover:bg-red-600 transition"><i data-lucide="log-out" class="w-4 h-4"></i></button>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar -->
            <nav class="w-16 md:w-64 bg-white border-r flex flex-col p-2 md:p-4 gap-2">
                <button onclick="setPanel('agenda')" class="nav-btn active flex items-center gap-3 p-3 rounded-xl text-gray-500 hover:bg-emerald-50"><i data-lucide="calendar"></i><span class="hidden md:block">Agenda</span></button>
                <button id="nav-abs" onclick="setPanel('absensi')" class="nav-btn flex items-center gap-3 p-3 rounded-xl text-gray-500 hover:bg-emerald-50"><i data-lucide="users"></i><span class="hidden md:block">Absensi</span></button>
                <button onclick="setPanel('rekap')" class="nav-btn flex items-center gap-3 p-3 rounded-xl text-gray-500 hover:bg-emerald-50"><i data-lucide="bar-chart"></i><span class="hidden md:block">Monitoring</span></button>
            </nav>

            <!-- Main Content -->
            <main class="flex-1 overflow-y-auto p-4 md:p-8">
                
                <!-- PANEL: AGENDA -->
                <div id="p-agenda" class="panel active space-y-6">
                    <div id="form-agenda-box" class="bg-white p-6 rounded-2xl shadow-sm border border-emerald-100">
                        <h3 class="text-lg font-bold mb-4 text-emerald-800 flex items-center gap-2"><i data-lucide="plus-circle"></i> Tambah Agenda</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="date" id="f-tgl" class="p-3 bg-gray-50 border rounded-xl outline-none">
                            <input type="text" id="f-jam" placeholder="Jam Ke (Misal: 1-4)" class="p-3 bg-gray-50 border rounded-xl outline-none">
                            <select id="f-kelas" class="p-3 bg-gray-50 border rounded-xl outline-none"></select>
                            <select id="f-mapel" class="p-3 bg-gray-50 border rounded-xl outline-none"></select>
                            <input type="text" id="f-materi" placeholder="Materi Pembelajaran" class="p-3 bg-gray-50 border rounded-xl outline-none md:col-span-2">
                            
                            <!-- KAMERA -->
                            <div class="md:col-span-2 space-y-2">
                                <label class="text-xs font-bold text-gray-400">FOTO BUKTI / SELFIE</label>
                                <div id="cam-box" class="hidden relative bg-black rounded-xl overflow-hidden aspect-video">
                                    <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                                    <button onclick="takePhoto()" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white p-4 rounded-full shadow-xl"><i data-lucide="camera" class="text-emerald-700"></i></button>
                                </div>
                                <div id="pre-box" class="hidden">
                                    <img id="photo-pre" class="w-full rounded-xl border aspect-video object-cover">
                                    <button onclick="resetCam()" class="text-xs text-red-500 font-bold mt-1 underline">Ambil Ulang</button>
                                </div>
                                <button id="btn-cam" onclick="initCam()" class="w-full py-4 border-2 border-dashed border-emerald-200 rounded-xl text-emerald-600 flex items-center justify-center gap-2 font-bold"><i data-lucide="camera"></i> Aktifkan Kamera</button>
                            </div>

                            <!-- TANDA TANGAN -->
                            <div class="md:col-span-2">
                                <label class="text-xs font-bold text-gray-400">TANDA TANGAN</label>
                                <canvas id="canvas" class="w-full h-32 border bg-gray-50 rounded-xl cursor-crosshair"></canvas>
                                <button onclick="clearCanvas()" class="text-[10px] text-red-500 font-bold uppercase mt-1">Hapus TTD</button>
                            </div>

                            <button onclick="saveAgenda()" class="md:col-span-2 bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-emerald-700 transition">SIMPAN DATA KE CLOUD</button>
                        </div>
                    </div>

                    <!-- TABEL -->
                    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 overflow-hidden">
                        <div class="p-4 bg-emerald-50 border-b flex justify-between items-center">
                            <h3 class="font-bold text-emerald-800">Riwayat Agenda</h3>
                            <button onclick="initData()" class="p-1 hover:rotate-180 transition-all"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead class="bg-gray-50 text-gray-500">
                                    <tr>
                                        <th class="p-4 text-left">Tgl</th>
                                        <th class="p-4 text-left">Guru</th>
                                        <th class="p-4 text-left">Kelas/Mapel</th>
                                        <th class="p-4 text-center">Bukti</th>
                                        <th class="p-4 text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="t-agenda"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- PANEL: ABSENSI -->
                <div id="p-absensi" class="panel space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-emerald-100">
                        <h3 class="text-lg font-bold mb-4 text-emerald-800">Input Absensi Siswa</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                            <input type="date" id="abs-tgl" class="p-3 bg-gray-50 border rounded-xl outline-none">
                            <select id="abs-kelas" onchange="renderSiswa()" class="p-3 bg-gray-50 border rounded-xl outline-none"></select>
                        </div>
                        <div id="siswa-list" class="space-y-2 mb-6"></div>
                        <button id="btn-save-abs" onclick="saveAbsensi()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl hidden shadow-lg">SIMPAN ABSENSI</button>
                    </div>
                </div>

                <!-- PANEL: REKAP -->
                <div id="p-rekap" class="panel space-y-6">
                    <h3 class="text-xl font-bold text-emerald-800">Monitoring Sistem</h3>
                    <div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                </div>

            </main>
        </div>
    </div>

    <script>
        // --- KONFIGURASI ---
        const API = "https://script.google.com/macros/s/AKfycbwXaJaJ2B11hJ0Q4ELSjSKbOKxsNadBSOdYU9FYlOZfkvR2y_eg1_WDgiJqVjoUdDQbow/exec"; // GANTI DENGAN URL APPS SCRIPT ANDA
        let DB = {}, curUser = {}, canvas, ctx, drawing = false, photo = "";

        // --- CORE FUNCTIONS ---
        async function initData() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const res = await fetch(API);
                DB = await res.json();
                fillDropdowns();
                renderAgenda();
                document.getElementById('loading').style.display = 'none';
            } catch (e) { alert("Sinkronisasi Gagal!"); }
        }

        function fillDropdowns() {
            const u = DB.guru.map(g => `<option value="${g.nama_guru}">${g.nama_guru}</option>`).join('');
            document.getElementById('l-user').innerHTML = '<option value="">-- PILIH GURU --</option>' + u;

            const k = DB.kelas.map(c => `<option value="${c.nama_kelas}">${c.nama_kelas}</option>`).join('');
            document.getElementById('f-kelas').innerHTML = '<option value="">Pilih Kelas</option>' + k;
            document.getElementById('abs-kelas').innerHTML = '<option value="">Pilih Kelas</option>' + k;

            const m = DB.mapel.map(s => `<option value="${s.nama_mapel}">${s.nama_mapel}</option>`).join('');
            document.getElementById('f-mapel').innerHTML = '<option value="">Pilih Mapel</option>' + m;
        }

        async function doLogin() {
            const user = document.getElementById('l-user').value;
            const pass = document.getElementById('l-pass').value;
            if(!user || !pass) return alert("Lengkapi data login!");

            const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'login', user, pass })});
            const data = await res.json();

            if(data.status === "SUCCESS") {
                curUser = data;
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-main').classList.remove('hidden');
                document.getElementById('u-name').innerText = data.user;
                document.getElementById('u-level').innerText = data.level;

                // Hak Akses
                if(data.level === "Kepala") {
                    document.getElementById('form-agenda-box').classList.add('hidden');
                    document.getElementById('nav-abs').classList.add('hidden');
                }
                
                setupCanvas();
                lucide.createIcons();
                initData();
            } else { alert("Password Salah!"); }
        }

        // --- KAMERA LOGIC ---
        async function initCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video').srcObject = stream;
                document.getElementById('cam-box').classList.remove('hidden');
                document.getElementById('btn-cam').classList.add('hidden');
            } catch (e) { alert("Izin kamera ditolak!"); }
        }

        function takePhoto() {
            const v = document.getElementById('video');
            const c = document.createElement('canvas');
            c.width = 640; c.height = 480;
            c.getContext('2d').drawImage(v, 0, 0, 640, 480);
            photo = c.toDataURL('image/jpeg', 0.6);
            document.getElementById('photo-pre').src = photo;
            document.getElementById('cam-box').classList.add('hidden');
            document.getElementById('pre-box').classList.remove('hidden');
            v.srcObject.getTracks().forEach(t => t.stop());
        }

        function resetCam() {
            document.getElementById('pre-box').classList.add('hidden');
            photo = "";
            initCam();
        }

        // --- CANVAS LOGIC ---
        function setupCanvas() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.strokeStyle = "#064e3b";

            const pos = e => {
                const r = canvas.getBoundingClientRect();
                const t = e.touches ? e.touches[0] : e;
                return { x: t.clientX - r.left, y: t.clientY - r.top };
            };
            const start = e => { drawing = true; ctx.beginPath(); const p = pos(e); ctx.moveTo(p.x, p.y); };
            const move = e => { if(drawing) { const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } };
            const stop = () => drawing = false;

            canvas.onmousedown = start; canvas.onmousemove = move; window.onmouseup = stop;
            canvas.ontouchstart = start; canvas.ontouchmove = move; canvas.ontouchend = stop;
        }
        function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }

        // --- CRUD ACTIONS ---
        async function saveAgenda() {
            const data = {
                tipe: 'agenda',
                tgl: document.getElementById('f-tgl').value,
                jam: document.getElementById('f-jam').value,
                kelas: document.getElementById('f-kelas').value,
                mapel: document.getElementById('f-mapel').value,
                materi: document.getElementById('f-materi').value,
                ttd: canvas.toDataURL(),
                foto: photo,
                guru: curUser.user
            };
            if(!data.tgl || !data.kelas || !photo) return alert("Tgl, Kelas, & Foto Wajib!");
            
            document.getElementById('loading').style.display = 'flex';
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'create', data })});
            alert("Berhasil!");
            location.reload();
        }

        function renderSiswa() {
            const kls = document.getElementById('abs-kelas').value;
            const s = DB.siswa.filter(x => x.kelas === kls);
            document.getElementById('siswa-list').innerHTML = s.map(i => `
                <div class="flex justify-between items-center p-4 bg-white border rounded-xl">
                    <span class="font-bold text-emerald-900">${i.nama_siswa}</span>
                    <select class="abs-val border rounded-lg p-2 text-sm bg-gray-50 outline-none" data-siswa="${i.nama_siswa}">
                        <option>Hadir</option><option>Izin</option><option>Sakit</option><option>Alpha</option>
                    </select>
                </div>
            `).join('');
            document.getElementById('btn-save-abs').classList.toggle('hidden', s.length === 0);
        }

        async function saveAbsensi() {
            const tgl = document.getElementById('abs-tgl').value;
            const kls = document.getElementById('abs-kelas').value;
            const vals = document.querySelectorAll('.abs-val');
            if(!tgl) return alert("Pilih Tanggal!");

            document.getElementById('loading').style.display = 'flex';
            for(let v of vals) {
                await fetch(API, { method: 'POST', body: JSON.stringify({ 
                    action: 'create', 
                    data: { tipe:'absensi', tgl, kelas:kls, siswa:v.dataset.siswa, status:v.value, guru:curUser.user }
                })});
            }
            alert("Absensi Selesai!");
            initData();
        }

        function renderAgenda() {
            let r = DB.records.filter(x => x.tipe === 'agenda');
            if(curUser.level === "Guru") r = r.filter(x => x.nama_guru === curUser.user);
            
            document.getElementById('t-agenda').innerHTML = r.reverse().map(i => `
                <tr class="border-b text-xs">
                    <td class="p-4">${i.tanggal.split('T')[0]}</td>
                    <td class="p-4 font-bold text-emerald-800">${i.nama_guru}</td>
                    <td class="p-4"><b>${i.kelas}</b><br>${i.mata_pelajaran}</td>
                    <td class="p-4 text-center">
                        ${i.foto_bukti ? `<img src="${i.foto_bukti}" class="w-10 h-10 rounded shadow mx-auto" onclick="window.open(this.src)">` : '-'}
                    </td>
                    <td class="p-4 text-center">
                        ${curUser.level === 'Admin' || i.nama_guru === curUser.user ? 
                        `<button onclick="delRec(${i.rowId})" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : '-'}
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
            renderStats();
        }

        async function delRec(id) {
            if(!confirm("Hapus data ini?")) return;
            document.getElementById('loading').style.display = 'flex';
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'delete', rowId: id })});
            initData();
        }

        function renderStats() {
            const ag = DB.records.filter(x => x.tipe === 'agenda').length;
            const ab = DB.records.filter(x => x.tipe === 'absensi').length;
            const s = DB.siswa.length;
            const g = DB.guru.length;
            const data = [
                { l: 'Total Agenda', v: ag, c: 'bg-blue-50 text-blue-700' },
                { l: 'Data Absensi', v: ab, c: 'bg-emerald-50 text-emerald-700' },
                { l: 'Total Siswa', v: s, c: 'bg-orange-50 text-orange-700' },
                { l: 'Total Guru', v: g, c: 'bg-purple-50 text-purple-700' }
            ];
            document.getElementById('stats').innerHTML = data.map(d => `
                <div class="${d.c} p-4 rounded-2xl border border-current/10">
                    <div class="text-2xl font-black">${d.v}</div>
                    <div class="text-[10px] uppercase font-bold opacity-70">${d.l}</div>
                </div>
            `).join('');
        }

        function setPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'bg-emerald-100', 'text-emerald-800'));
            event.currentTarget.classList.add('active', 'bg-emerald-100', 'text-emerald-800');
        }

        window.onload = initData;
    </script>
</body>
</html>
