<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Guru SMK - Cloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f0fdf4; }
    .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.5rem; cursor: pointer; transition: 0.15s; }
    .nav-item:hover { background: #ecfdf5; }
    .nav-item.active { background: #d1fae5; color: #065f46; font-weight: 600; }
    .panel { display: none; }
    .panel.active { display: block; }
    canvas { touch-action: none; }
  </style>
</head>
<body>

  <!-- LOADING OVERLAY -->
  <div id="loading" class="fixed inset-0 bg-white/80 z-50 flex items-center justify-center font-bold text-emerald-800">
    Memuat Data...
  </div>

  <!-- SCREEN: LOGIN -->
  <div id="screen-login" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-emerald-100">
      <div class="text-center mb-6">
        <img class="w-20 h-20 mx-auto mb-4" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgz1tbb8TSawO2lHGi_GXN3Il5CtrN_K125hSy7D8NxvBFL6bywiebvkalj_6oRIBVxEm_zj84j6ZAlhKmaEOqjIeGHXe9SWw0HQipKs3aL8iy7K1Dc_Pd9SHMVZsOQrb99qTK78Wmee7StIKKzzfST5YU_CkGSAz3MuMJsrSL_nHt37c5AzIe8B7HodnQ/s320/LOGO%20SMKN%20BOJONGGAMBIR.png">
        <h1 class="text-2xl font-bold text-emerald-900">Dashboard Guru</h1>
        <p class="text-gray-500 text-sm">SMKN Bojonggambir Online</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Nama Guru</label>
          <select id="login-username" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-emerald-500"></select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Password</label>
          <input type="password" id="login-password" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <button onclick="attemptLogin()" id="btn-login" class="w-full bg-emerald-700 text-white py-3 rounded-lg font-bold hover:bg-emerald-800 transition">Masuk</button>
      </div>
    </div>
  </div>

  <!-- SCREEN: MAIN DASHBOARD -->
  <div id="screen-main" class="hidden min-h-screen flex flex-col">
    <header class="bg-emerald-900 text-white p-4 shadow-md flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img class="w-10 h-10 bg-white/20 p-1 rounded" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgz1tbb8TSawO2lHGi_GXN3Il5CtrN_K125hSy7D8NxvBFL6bywiebvkalj_6oRIBVxEm_zj84j6ZAlhKmaEOqjIeGHXe9SWw0HQipKs3aL8iy7K1Dc_Pd9SHMVZsOQrb99qTK78Wmee7StIKKzzfST5YU_CkGSAz3MuMJsrSL_nHt37c5AzIe8B7HodnQ/s320/LOGO%20SMKN%20BOJONGGAMBIR.png">
        <div>
          <h2 class="font-bold leading-tight" id="header-guru-name">Dashboard</h2>
          <p class="text-xs text-emerald-200">SMKN Bojonggambir</p>
        </div>
      </div>
      <button onclick="logout()" class="text-xs bg-emerald-800 px-3 py-2 rounded hover:bg-red-700 transition">Keluar</button>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- Sidebar -->
      <aside class="w-64 bg-white border-r hidden md:block p-4 space-y-1">
        <div class="nav-item active" onclick="switchPanel('agenda')"><i data-lucide="calendar"></i><span>Agenda</span></div>
        <div class="nav-item" onclick="switchPanel('absensi')"><i data-lucide="user-check"></i><span>Absensi</span></div>
        <div class="nav-item" onclick="switchPanel('jurnal')"><i data-lucide="book-open"></i><span>Jurnal</span></div>
        <div class="nav-item" onclick="switchPanel('nilai')"><i data-lucide="award"></i><span>Penilaian</span></div>
        <div class="nav-item" onclick="switchPanel('rekap')"><i data-lucide="bar-chart"></i><span>Rekap</span></div>
      </aside>

      <!-- Content -->
      <main class="flex-1 overflow-y-auto p-4 md:p-8">
        
        <!-- Panel Agenda -->
        <div id="panel-agenda" class="panel active">
          <form id="form-agenda" class="bg-white p-6 rounded-xl shadow-sm border mb-6">
            <h3 class="text-lg font-bold text-emerald-800 mb-4">Input Agenda Mengajar</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <input type="date" id="ag-tgl" required class="border p-2 rounded">
              <input type="text" id="ag-jam" placeholder="Jam Ke (Contoh: 1-4)" required class="border p-2 rounded">
              <select id="ag-kelas" required class="border p-2 rounded"></select>
              <select id="ag-mapel" required class="border p-2 rounded"></select>
              <input type="text" id="ag-materi" placeholder="Materi" required class="border p-2 rounded md:col-span-2">
              <textarea id="ag-kegiatan" placeholder="Kegiatan Pembelajaran" class="border p-2 rounded md:col-span-2"></textarea>
            </div>
            <div class="mt-4">
              <p class="text-sm font-medium mb-2">Tanda Tangan Digital:</p>
              <canvas id="sig-agenda" class="border w-full h-32 bg-gray-50 rounded cursor-crosshair"></canvas>
              <button type="button" onclick="clearSig('sig-agenda')" class="text-xs text-red-500 mt-1">Hapus Tanda Tangan</button>
            </div>
            <button type="submit" class="mt-4 bg-emerald-700 text-white px-6 py-2 rounded font-bold w-full">Simpan Agenda</button>
          </form>
          <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
             <table class="w-full text-sm">
               <thead class="bg-gray-50 border-b"><tr><th class="p-3 text-left">Tgl</th><th class="p-3 text-left">Kelas</th><th class="p-3 text-left">Materi</th><th class="p-3">Aksi</th></tr></thead>
               <tbody id="table-agenda"></tbody>
             </table>
          </div>
        </div>

        <!-- Panel Absensi -->
        <div id="panel-absensi" class="panel">
          <div class="bg-white p-6 rounded-xl shadow-sm border mb-6">
            <h3 class="text-lg font-bold text-emerald-800 mb-4">Absensi Siswa</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
              <input type="date" id="abs-tgl" class="border p-2 rounded">
              <select id="abs-kelas" onchange="loadSiswaList()" class="border p-2 rounded"></select>
            </div>
            <div id="list-siswa-absensi" class="space-y-2 border-t pt-4"></div>
            <button onclick="submitBulkAbsensi()" class="mt-6 bg-emerald-700 text-white px-6 py-2 rounded font-bold w-full">Simpan Semua Kehadiran</button>
          </div>
        </div>

        <!-- Panel Rekap (Simpel) -->
        <div id="panel-rekap" class="panel">
           <h3 class="text-lg font-bold text-emerald-800 mb-4">Rekap Kehadiran Saya</h3>
           <div id="rekap-container" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>

      </main>
    </div>
  </div>

  <script>
    // KONFIGURASI: GANTI DENGAN URL WEB APP ANDA!
    const API_URL = "URL_WEB_APP_APPS_SCRIPT_ANDA";

    let DB = { guru:[], kelas:[], mapel:[], siswa:[], records:[] };
    let currentGuru = "";
    let signatures = {};

    // 1. INIT DATA
    async function fetchData() {
      document.getElementById('loading').style.display = 'flex';
      try {
        const res = await fetch(API_URL);
        DB = await res.json();
        populateDropdowns();
        renderTables();
        document.getElementById('loading').style.display = 'none';
      } catch (e) { alert("Koneksi gagal!"); }
    }

    function populateDropdowns() {
      const gSel = document.getElementById('login-username');
      gSel.innerHTML = DB.guru.map(g => `<option value="${g.nama_guru}">${g.nama_guru}</option>`).join('');
      
      const kSelects = ['ag-kelas', 'abs-kelas'];
      kSelects.forEach(id => {
        document.getElementById(id).innerHTML = `<option value="">-- Pilih Kelas --</option>` + 
          DB.kelas.map(k => `<option value="${k.nama_kelas}">${k.nama_kelas}</option>`).join('');
      });

      document.getElementById('ag-mapel').innerHTML = `<option value="">-- Pilih Mapel --</option>` + 
        DB.mapel.map(m => `<option value="${m.nama_mapel}">${m.nama_mapel}</option>`).join('');
    }

    // 2. LOGIN SYSTEM
    async function attemptLogin() {
      const user = document.getElementById('login-username').value;
      const pass = document.getElementById('login-password').value;
      
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'login', username: user, password: pass })
      });
      
      if (await res.text() === "SUCCESS") {
        currentGuru = user;
        document.getElementById('screen-login').classList.add('hidden');
        document.getElementById('screen-main').classList.remove('hidden');
        document.getElementById('header-guru-name').textContent = currentGuru;
        lucide.createIcons();
        initCanvas('sig-agenda');
      } else {
        alert("Password Salah!");
      }
    }

    // 3. PANEL NAVIGATION
    function switchPanel(name) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      event.currentTarget.classList.add('active');
      if(name === 'rekap') renderRekap();
    }

    // 4. CANVAS / TANDA TANGAN
    function initCanvas(id) {
      const canvas = document.getElementById(id);
      const ctx = canvas.getContext('2d');
      let drawing = false;
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;

      canvas.addEventListener('mousedown', () => drawing = true);
      canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
      canvas.addEventListener('mousemove', (e) => {
        if(!drawing) return;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
      });
      signatures[id] = canvas;
    }

    function clearSig(id) {
      const ctx = signatures[id].getContext('2d');
      ctx.clearRect(0,0, signatures[id].width, signatures[id].height);
    }

    // 5. CRUD OPERATIONS
    document.getElementById('form-agenda').onsubmit = async (e) => {
      e.preventDefault();
      const data = {
        tipe: 'agenda',
        tanggal: document.getElementById('ag-tgl').value,
        jam_ke: document.getElementById('ag-jam').value,
        kelas: document.getElementById('ag-kelas').value,
        mata_pelajaran: document.getElementById('ag-mapel').value,
        materi: document.getElementById('ag-materi').value,
        kegiatan: document.getElementById('ag-kegiatan').value,
        nama_guru: currentGuru,
        tanda_tangan: signatures['sig-agenda'].toDataURL()
      };
      
      await sendToSheet(data);
      e.target.reset();
      clearSig('sig-agenda');
    };

    async function sendToSheet(data) {
      document.getElementById('loading').style.display = 'flex';
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'create', data: data })
      });
      await fetchData();
    }

    // 6. RENDER TABLES
    function renderTables() {
      const myAgenda = DB.records.filter(r => r.tipe === 'agenda' && r.nama_guru === currentGuru);
      document.getElementById('table-agenda').innerHTML = myAgenda.map(r => `
        <tr class="border-b">
          <td class="p-3">${r.tanggal}</td>
          <td class="p-3">${r.kelas}</td>
          <td class="p-3">${r.materi}</td>
          <td class="p-3 text-center">
            <button onclick="delRow(${r.__rowId})" class="text-red-500">Hapus</button>
          </td>
        </tr>
      `).join('');
    }

    async function delRow(id) {
      if(!confirm("Hapus baris ini?")) return;
      document.getElementById('loading').style.display = 'flex';
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'delete', rowId: id })
      });
      await fetchData();
    }

    // 7. ABSENSI BULK
    function loadSiswaList() {
      const kelas = document.getElementById('abs-kelas').value;
      const list = DB.siswa.filter(s => s.kelas === kelas);
      document.getElementById('list-siswa-absensi').innerHTML = list.map(s => `
        <div class="flex items-center justify-between bg-gray-50 p-3 rounded border">
          <span class="font-medium">${s.nama_siswa}</span>
          <select data-name="${s.nama_siswa}" class="abs-status border rounded p-1">
            <option>Hadir</option><option>Izin</option><option>Sakit</option><option>Alpha</option>
          </select>
        </div>
      `).join('');
    }

    async function submitBulkAbsensi() {
      const tgl = document.getElementById('abs-tgl').value;
      const kelas = document.getElementById('abs-kelas').value;
      const selects = document.querySelectorAll('.abs-status');
      
      document.getElementById('loading').style.display = 'flex';
      for(let sel of selects) {
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ 
            action: 'create', 
            data: {
              tipe: 'absensi', tanggal: tgl, kelas: kelas,
              nama_siswa: sel.dataset.name, status_hadir: sel.value,
              nama_guru: currentGuru
            } 
          })
        });
      }
      alert("Absensi Berhasil!");
      fetchData();
    }

    function logout() { location.reload(); }

    window.onload = fetchData;
  </script>
</body>
</html>
